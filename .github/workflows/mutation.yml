name: mutation

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Remove editable shadow
        # mutmut imports the mutated copy under mutants/; the PEP 660 editable
        # install registers a finder that would shadow it. Drop the package
        # (keeping its deps) so mutations actually take effect.
        run: pip uninstall -y attune-verify
      - name: Run mutation testing
        run: |
          mutmut run
          mutmut export-cicd-stats
      - name: Gate on mutation score
        run: python scripts/mutation_gate.py 0.75
      - name: Show survivors (informational)
        if: always()
        run: |
          mutmut results | grep ': survived' || true
